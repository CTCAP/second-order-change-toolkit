<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2B6E6E"></path>
    </marker>
    <marker id="arrow-rust" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#B5533C"></path>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B564C"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="720" fill="#FAF7F1"></rect>

  
  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#2B6E6E" font-family="-apple-system, sans-serif" font-weight="700">BATESON · WATZLAWICK</text>
  <text x="60" y="98" font-size="34" fill="#23201B" font-weight="600">First-Order vs Second-Order Change</text>
  <line x1="60" y1="118" x2="940" y2="118" stroke="#DED6C6" stroke-width="1.5"></line>

  
  <g>
    <rect x="60" y="150" width="410" height="230" rx="4" fill="#FFFFFF" stroke="#DED6C6"></rect>
    <rect x="60" y="150" width="410" height="6" fill="#B5533C"></rect>
    <text x="86" y="192" font-size="20" fill="#B5533C" font-weight="700">First-order change</text>
    <text x="86" y="220" font-size="14" fill="#5B564C" font-family="-apple-system, sans-serif">Same rules, different amount</text>

    
    <circle cx="160" cy="300" r="34" fill="none" stroke="#B5533C" stroke-width="2.5"></circle>
    <text x="160" y="305" font-size="15" text-anchor="middle" fill="#23201B" font-weight="600">A</text>
    <path d="M198,290 C 230,270 270,270 300,290" fill="none" stroke="#B5533C" stroke-width="2" marker-end="url(#arrow-rust)"></path>
    <circle cx="340" cy="300" r="34" fill="none" stroke="#B5533C" stroke-width="2.5"></circle>
    <text x="340" y="305" font-size="15" text-anchor="middle" fill="#23201B" font-weight="600">A′</text>
    <text x="250" y="260" font-size="12" text-anchor="middle" fill="#5B564C" font-family="-apple-system, sans-serif">more / less / harder</text>

    <rect x="86" y="345" width="358" height="1" fill="#DED6C6"></rect>
    <text x="86" y="368" font-size="13" fill="#23201B" font-family="-apple-system, sans-serif">Tinkering within the existing rule set.</text>
  </g>

  
  <g>
    <rect x="530" y="150" width="410" height="230" rx="4" fill="#FFFFFF" stroke="#DED6C6"></rect>
    <rect x="530" y="150" width="410" height="6" fill="#2B6E6E"></rect>
    <text x="556" y="192" font-size="20" fill="#2B6E6E" font-weight="700">Second-order change</text>
    <text x="556" y="220" font-size="14" fill="#5B564C" font-family="-apple-system, sans-serif">Different rules altogether</text>

    <circle cx="630" cy="300" r="34" fill="none" stroke="#2B6E6E" stroke-width="2.5"></circle>
    <text x="630" y="305" font-size="15" text-anchor="middle" fill="#23201B" font-weight="600">A</text>
    <path d="M668,300 L 790,300" fill="none" stroke="#2B6E6E" stroke-width="2" stroke-dasharray="1,7" stroke-linecap="round" marker-end="url(#arrow-teal)"></path>
    <rect x="800" y="270" width="70" height="60" rx="34" fill="none" stroke="#2B6E6E" stroke-width="2.5"></rect>
    <text x="835" y="305" font-size="15" text-anchor="middle" fill="#23201B" font-weight="600">B</text>
    <text x="729" y="270" font-size="12" text-anchor="middle" fill="#5B564C" font-family="-apple-system, sans-serif">a jump — a new frame</text>

    <rect x="556" y="345" width="358" height="1" fill="#DED6C6"></rect>
    <text x="556" y="368" font-size="13" fill="#23201B" font-family="-apple-system, sans-serif">A discontinuity in the rules themselves.</text>
  </g>

  
  <g>
    <rect x="60" y="420" width="880" height="230" rx="4" fill="#FFFFFF" stroke="#DED6C6"></rect>
    <text x="86" y="460" font-size="19" fill="#23201B" font-weight="700">The trap: “more of the same”</text>
    <text x="86" y="484" font-size="14" fill="#5B564C" font-family="-apple-system, sans-serif">Applying a first-order fix to a second-order problem — the attempted solution becomes the problem.</text>

    
    <g transform="translate(150,560)">
      <circle cx="0" cy="0" r="42" fill="#FAF7F1" stroke="#B5533C" stroke-width="2.5"></circle>
      <text x="0" y="-4" font-size="12.5" text-anchor="middle" fill="#23201B" font-family="-apple-system, sans-serif" font-weight="600">Problem</text>
      <text x="0" y="12" font-size="12.5" text-anchor="middle" fill="#23201B" font-family="-apple-system, sans-serif" font-weight="600">persists</text>
    </g>
    <path d="M195,555 C 260,520 330,520 385,548" fill="none" stroke="#B5533C" stroke-width="2" marker-end="url(#arrow-rust)"></path>
    <text x="290" y="510" font-size="12" text-anchor="middle" fill="#5B564C" font-family="-apple-system, sans-serif">try harder</text>

    <g transform="translate(430,560)">
      <circle cx="0" cy="0" r="42" fill="#FAF7F1" stroke="#B5533C" stroke-width="2.5"></circle>
      <text x="0" y="4" font-size="12.5" text-anchor="middle" fill="#23201B" font-family="-apple-system, sans-serif" font-weight="600">Same fix,</text>
      <text x="0" y="20" font-size="12.5" text-anchor="middle" fill="#23201B" font-family="-apple-system, sans-serif" font-weight="600">intensified</text>
    </g>
    <path d="M475,548 C 530,520 600,520 665,555" fill="none" stroke="#B5533C" stroke-width="2" marker-end="url(#arrow-rust)"></path>
    <text x="570" y="510" font-size="12" text-anchor="middle" fill="#5B564C" font-family="-apple-system, sans-serif">it holds / worsens</text>

    <path d="M665,585 C 600,640 260,640 195,600" fill="none" stroke="#B5533C" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-rust)"></path>
    <text x="430" y="660" font-size="12" text-anchor="middle" fill="#5B564C" font-family="-apple-system, sans-serif">the fix loops back into the pattern that sustains the problem</text>

    
    <path d="M760,560 C 800,560 820,540 830,505" fill="none" stroke="#2B6E6E" stroke-width="2.5" marker-end="url(#arrow-teal)"></path>
    <text x="835" y="495" font-size="12.5" fill="#2B6E6E" font-family="-apple-system, sans-serif" font-weight="700">reframe</text>
    <text x="835" y="512" font-size="12.5" fill="#2B6E6E" font-family="-apple-system, sans-serif" font-weight="700">= exit</text>
  </g>

  <text x="60" y="700" font-size="12" fill="#9AA4AF" font-family="-apple-system, sans-serif" font-style="italic">Watzlawick, Weakland &amp; Fisch, &#34;Change: Principles of Problem Formation and Problem Resolution&#34; (1974), building on Bateson&#39;s logical types.</text>
</svg>